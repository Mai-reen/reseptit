<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Kirjautuminen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e6e6fa 0%, #ffb6c1 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(216, 112, 147, 0.3);
            padding: 3rem 2rem;
            max-width: 400px;
            width: 90%;
            border: 3px solid #d8bfd8;
        }

        h1 {
            color: #d87093;
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: 1.8rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #5d3954;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e6e6fa;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #ff91a4;
            box-shadow: 0 0 0 3px rgba(255, 145, 164, 0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #ff91a4 0%, #d87093 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(216, 112, 147, 0.4);
        }

        .error {
            color: #d87093;
            background: #ffe6f0;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }

        .success {
            color: #2d5016;
            background: #e8f5e9;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🔐 Resepti Admin</h1>

        <div class="error" id="errorMsg"></div>
        <div class="success" id="successMsg"></div>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Sähköposti</label>
                <input type="email" id="loginEmail" placeholder="sinun@email.com" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">Salasana</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required>
            </div>
            <button type="submit">Kirjaudu sisään</button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; color: #7a5c75;">
            <a href="/" style="color: #d87093; text-decoration: none; font-weight: 600;">← Takaisin etusivulle</a>
        </p>
    </div>

    <script src="/login.js" defer></script>
</body>
</html>
