<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Paneeli</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e6e6fa 0%, #ffb6c1 100%);
            color: #5d3954;
        }

        header {
            background: linear-gradient(135deg, #d87093 0%, #d8bfd8 100%);
            color: white;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(216, 112, 147, 0.3);
        }

        h1 {
            font-size: 1.8rem;
        }

        .logout-btn {
            background: #ff91a4;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(216, 112, 147, 0.4);
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid rgba(216, 112, 147, 0.3);
        }

        .tab-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            color: #7a5c75;
            cursor: pointer;
            font-weight: 600;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .tab-btn.active {
            color: #d87093;
            border-bottom-color: #d87093;
        }

        .tab-content {
            display: none;
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(216, 112, 147, 0.2);
            border: 2px solid #d8bfd8;
        }

        .tab-content.active {
            display: block;
        }

        .recipe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .recipe-card {
            background: #fffafa;
            border-radius: 10px;
            padding: 1.5rem;
            border: 2px solid #e6e6fa;
            transition: all 0.3s ease;
        }

        .recipe-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(216, 112, 147, 0.2);
        }

        .recipe-card h3 {
            color: #d87093;
            margin-bottom: 0.5rem;
            font-size: 1.2rem;
        }

        .recipe-card p {
            color: #7a5c75;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .recipe-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-edit, .btn-delete {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .btn-edit {
            background: #8a2be2;
            color: white;
        }

        .btn-edit:hover {
            background: #7b1fa2;
        }

        .btn-delete {
            background: #ff6b88;
            color: white;
        }

        .btn-delete:hover {
            background: #ff4757;
        }

        .form-section {
            background: #fffafa;
            padding: 2rem;
            border-radius: 10px;
            border: 2px solid #e6e6fa;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #5d3954;
            font-weight: 600;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e6e6fa;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #ff91a4;
            box-shadow: 0 0 0 3px rgba(255, 145, 164, 0.3);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn-submit {
            background: linear-gradient(135deg, #ff91a4 0%, #d87093 100%);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(216, 112, 147, 0.4);
        }

        .error, .success {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }

        .error {
            background: #ffe6f0;
            color: #d87093;
        }

        .success {
            background: #e8f5e9;
            color: #2d5016;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .tabs {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>👨‍💼 Resepti Admin Paneeli</h1>
        <button class="logout-btn" onclick="logout()">Kirjaudu ulos</button>
    </header>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('recipes')">Reseptit</button>
            <button class="tab-btn" onclick="switchTab('add')">Lisää resepti</button>
            <button class="tab-btn" onclick="switchTab('edit')">Muokkaa reseptiä</button>
        </div>

        <!-- Recipes List Tab -->
        <div id="recipes" class="tab-content active">
            <h2>📋 Kaikki reseptit</h2>
            <div class="error" id="recipesError"></div>
            <div class="recipe-grid" id="recipesList"></div>
        </div>

        <!-- Add Recipe Tab -->
        <div id="add" class="tab-content">
            <h2>➕ Lisää uusi resepti</h2>
            <div class="error" id="addError"></div>
            <div class="success" id="addSuccess"></div>
            <form id="addRecipeForm" class="form-section">
                <div class="form-group">
                    <label for="addTitle">Reseptin nimi</label>
                    <input type="text" id="addTitle" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="addDescription">Kuvaus</label>
                        <input type="text" id="addDescription" placeholder="esim. 15 minuuttia">
                    </div>
                    <div class="form-group">
                        <label for="addImage">Kuvan URL</label>
                        <input type="url" id="addImage">
                    </div>
                </div>
                <div class="form-group">
                    <label for="addCategories">Kategoriat (pilkulla eroteltu)</label>
                    <input type="text" id="addCategories" placeholder="esim. pääruoka,aasialainen">
                </div>
                <div class="form-group">
                    <label for="addIngredients">Ainekset (yksi per rivi)</label>
                    <textarea id="addIngredients"></textarea>
                </div>
                <div class="form-group">
                    <label for="addInstructions">Ohjeet (yksi per rivi)</label>
                    <textarea id="addInstructions"></textarea>
                </div>
                <button type="submit" class="btn-submit">Lisää resepti</button>
            </form>
        </div>

        <!-- Edit Recipe Tab -->
        <div id="edit" class="tab-content">
            <h2>✏️ Muokkaa reseptiä</h2>
            <div class="error" id="editError"></div>
            <div class="success" id="editSuccess"></div>
            <div class="form-section">
                <div class="form-group">
                    <label for="editRecipeSelect">Valitse resepti muokkaamiseen</label>
                    <select id="editRecipeSelect">
                        <option value="">-- Valitse resepti --</option>
                    </select>
                </div>
            </div>
            <form id="editRecipeForm" class="form-section" style="display: none;">
                <div class="form-group">
                    <label for="editTitle">Reseptin nimi</label>
                    <input type="text" id="editTitle" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="editDescription">Kuvaus</label>
                        <input type="text" id="editDescription">
                    </div>
                    <div class="form-group">
                        <label for="editImage">Kuvan URL</label>
                        <input type="url" id="editImage">
                    </div>
                </div>
                <div class="form-group">
                    <label for="editCategories">Kategoriat (pilkulla eroteltu)</label>
                    <input type="text" id="editCategories">
                </div>
                <div class="form-group">
                    <label for="editIngredients">Ainekset (yksi per rivi)</label>
                    <textarea id="editIngredients"></textarea>
                </div>
                <div class="form-group">
                    <label for="editInstructions">Ohjeet (yksi per rivi)</label>
                    <textarea id="editInstructions"></textarea>
                </div>
                <button type="submit" class="btn-submit">Tallenna muutokset</button>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
